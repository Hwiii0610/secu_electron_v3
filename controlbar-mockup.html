<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SecuWatcher Export — 컨트롤바 최종 목업</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    color: #e0e0e0;
    font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 24px;
    gap: 10px;
  }

  .label {
    width: 960px;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 4px;
    margin-top: 16px;
  }
  .label--a { background: rgba(255,152,0,0.12); color: #ff9800; }
  .label--b { background: rgba(76,175,80,0.12); color: #4caf50; }

  /* ===== 컨트롤바 ===== */
  .bar {
    width: 960px;
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 10px;
    padding: 10px 16px 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  /* 타임 눈금 */
  .ruler {
    position: relative;
    height: 20px;
    margin: 0 2px;
    user-select: none;
  }
  .ruler .t {
    position: absolute; top: 0;
    font-size: 9px; color: #555;
    transform: translateX(-50%);
  }
  .ruler .t::after {
    content: ''; display: block;
    width: 1px; height: 5px;
    background: #444; margin: 2px auto 0;
  }
  .ruler .now {
    position: absolute; top: -2px; left: 50%;
    transform: translateX(-50%);
    font-size: 11px; font-weight: 700;
    color: #4a9eff;
    background: rgba(74,158,255,0.12);
    padding: 1px 8px; border-radius: 4px; z-index: 2;
  }

  /* 썸네일 타임라인 */
  .tl {
    width: 100%; height: 56px;
    overflow: hidden; border-radius: 4px;
    border: 1px solid #333;
    position: relative; display: flex;
  }
  .tl .ph {
    position: absolute; left: 50%;
    top: -2px; bottom: -2px;
    width: 2px; background: #4a9eff;
    z-index: 10; pointer-events: none;
  }
  .tl .ph::before {
    content: ''; position: absolute;
    top: 0; left: -4px;
    width: 10px; height: 7px;
    background: #4a9eff;
    clip-path: polygon(50% 100%, 0 0, 100% 0);
  }
  .seg { position: relative; display: flex; flex-shrink: 0; }
  .seg-d { width: 3px; height: 56px; flex-shrink: 0; background: #ff9800; z-index: 5; }
  .th {
    width: 50px; height: 56px; flex-shrink: 0;
    border-right: 1px solid rgba(0,0,0,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: rgba(255,255,255,0.12);
  }
  .dur {
    position: absolute; bottom: 3px; right: 5px;
    font-size: 10px; font-weight: 700; color: #ff9800;
    background: rgba(0,0,0,0.75);
    padding: 1px 5px; border-radius: 3px; z-index: 3;
  }
  .dur--total { color: #4a9eff; }

  /* 하단 Row — 플레이 버튼을 정확히 50% 중앙 고정 */
  .bot {
    position: relative;
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 4px 0 0;
    min-height: 56px;
  }
  .grp { display: flex; align-items: center; gap: 4px; }
  .div { width: 1px; height: 24px; background: #444; margin: 0 8px; }

  /* 중앙 플레이 그룹: 절대 위치로 정확히 50% */
  .grp--center {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
  }

  /* 좌/우 그룹은 relative로 양쪽 끝에 위치 */
  .grp--left { position: relative; z-index: 1; }
  .grp--right { position: relative; z-index: 1; }

  /* 버튼 공통 */
  .b {
    height: 34px; background: rgba(255,255,255,0.04);
    border: 1px solid #3a3a3a; border-radius: 6px;
    color: #999; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; font-family: inherit;
  }
  .b:hover { background: rgba(255,255,255,0.1); color: #ddd; border-color: #555; }

  .b--sm { width: 34px; font-size: 16px; }
  .b--nav { width: 40px; font-size: 18px; background: transparent; border-color: transparent; }
  .b--nav:hover { background: rgba(255,255,255,0.08); }
  .b--play {
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(255,255,255,0.07); border: 1px solid #444;
    font-size: 20px; color: #ccc; margin: 0 4px;
  }
  .b--play:hover { background: rgba(255,255,255,0.14); color: #fff; }
  .b--fn {
    padding: 0 12px; font-size: 12px; gap: 5px;
    white-space: nowrap; border-color: transparent; background: transparent;
  }
  .b--split { color: #ff9800; font-weight: 600; }
  .b--split:hover { color: #ffb74d; background: rgba(255,152,0,0.08); }
  .b--pv { color: #aaa; }
  .b--pv:hover { color: #fff; }

  /* 프레임 뱃지 */
  .fm {
    display: flex; align-items: center; gap: 4px;
    background: rgba(74,158,255,0.1);
    border: 1px solid rgba(74,158,255,0.3);
    border-radius: 6px; padding: 4px 10px;
    font-size: 11px; font-weight: 600; color: #4a9eff;
    user-select: none; white-space: nowrap;
  }
  .fm .a { font-size: 7px; line-height: 1; display: flex; flex-direction: column; }
  .fn { font-size: 11px; color: #777; white-space: nowrap; }
  .fn b { color: #aaa; font-weight: 700; }
</style>
</head>
<body>

<!-- ============================================ -->

  <div class="bot">

      <button class="b b--sm" title="실행취소">↩</button>
      <button class="b b--sm" title="다시실행">↪</button>

    <div class="grp grp--center">

  </div>
</div>
